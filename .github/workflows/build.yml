name: .NET Framework 4.7.2 Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # 1. 必ず Windows 環境を指定
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. MSBuild を使用できるようにセットアップ
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. NuGet パッケージの復元
    - name: Restore NuGet packages
      run: nuget restore ConsoleApp20260615.sln

    # 4. MSBuild でソリューションをビルド
    - name: Build solution
      run: msbuild ConsoleApp20260615.sln /p:Configuration=Release

    # 5. ビルドされた exe ファイルを保存
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-application-exe
        path: |
          **/bin/Release/**/*.exe
          **/bin/Release/**/*.dll

    # --------------------------------------------------
    # ここでビルドやファイルの圧縮を行う
    # --------------------------------------------------
    - name: Archive release files
      shell: pwsh # PowerShellを使用してZIP化
      run: |
        # 出力用ディレクトリを作成
        New-Item -ItemType Directory -Force -Path .\dist
        
        # Releaseフォルダ内のexeとdllを探してdistにコピー
        Get-ChildItem -Recurse -Include *.exe, *.dll | Where-Object { $_.FullName -like "*\bin\Release\*" } | Copy-Item -Destination .\dist

        # distフォルダごとZIP圧縮
        Compress-Archive -Path .\dist\* -DestinationPath .\release.zip -Force

    # --------------------------------------------------
    # GitHub Releases へ自動作成＆アップロード
    # --------------------------------------------------
    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: release.zip # 上記で作成したファイル名と一致させる
        generate_release_notes: true # コミット履歴からリリースノートを自動生成
